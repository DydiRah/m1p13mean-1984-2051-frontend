<div class="fixed inset-0 z-100 flex items-center justify-center" [class.hidden]="!(isOpen$ | async)">
  <!-- Overlay -->
  <div
    class="absolute inset-0 bg-black/50"
    (click)="closeModal()"
  ></div>

  <!-- Modal Content -->
  <div class="relative z-10 w-full max-w-md rounded-lg bg-white p-6 dark:bg-gray-800">
    <!-- Header -->
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-white">
        {{ isEditMode ? 'Edit Stock Movement' : 'Add New Stock Movement' }}
      </h2>
      <button
        type="button"
        (click)="closeModal()"
        class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
      >
        <svg
          class="h-6 w-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Error Message -->
    @if (error) {
    <div
      class="mb-4 rounded-lg bg-red-50 p-4 text-sm text-red-700 dark:bg-red-900/20 dark:text-red-400"
    >
      {{ error }}
    </div>
    }

    <!-- Success Message -->
    @if (success) {
    <div
      class="mb-4 rounded-lg bg-green-50 p-4 text-sm text-green-700 dark:bg-green-900/20 dark:text-green-400"
    >
      {{ success }}
    </div>
    }

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- Item Field -->
      <div>
        <app-label [for]="'item'">Item</app-label>
        <select
          id="item"
          name="item"
          [(ngModel)]="form.item_id"
          class="w-full h-11 rounded-lg border border-gray-300 px-4 py-2.5 text-sm bg-transparent text-gray-800 focus:outline-hidden focus:ring-3 focus:border-brand-300 focus:ring-brand-500/20 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
        >
          <option value="" disabled>
            {{ items.length === 0 ? 'Aucun item disponible' : 'Sélectionnez un item' }}
          </option>
          <option *ngFor="let item of items" [ngValue]="item._id">{{ item?.name }}</option>
        </select>
      </div>

      <!-- Type Field -->
      <div>
        <app-label [for]="'type'">Type</app-label>
        <select
          id="type"
          name="type"
          [(ngModel)]="form.type"
          class="w-full h-11 rounded-lg border border-gray-300 px-4 py-2.5 text-sm bg-transparent text-gray-800 focus:outline-hidden focus:ring-3 focus:border-brand-300 focus:ring-brand-500/20 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
        >
          <option value="" disabled>Sélectionnez le type de mouvement</option>
          <option value="input">Input</option>
          <option value="output">Output</option>
        </select>
      </div>

      <!-- PurchasePrice fiels -->
      <div>
        <app-label [for]="'purchasePrice'">Purchase Price (Ariary)</app-label>
        <app-input-field
          id="purchasePrice"
          name="purchasePrice"
          type="number"
          placeholder="Enter price"
          [(ngModel)]="form.purchasePrice"
          min="0"
          [step]="0.01"
          [error]="!!error && error.includes('Purchase Price')"
        />
      </div>

      <!-- Quantity Field -->
      <div>
        <app-label [for]="'quantity'">Quantity</app-label>
        <app-input-field
          id="quantity"
          name="quantity"
          type="number"
          placeholder="Enter quantity"
          [(ngModel)]="form.quantity"
          min="0"
          [step]="0.01"
          [error]="!!error && error.includes('Quantity')"
        />
      </div>

      <!-- Buttons -->
      <div class="mt-6 flex gap-3">
        <app-button
          [disabled]="isLoading"
          variant="outline"
          (btnClick)="closeModal()"
        >
          Cancel
        </app-button>
        <button
          type="submit"
          [disabled]="isLoading"
          class="inline-flex items-center justify-center gap-2 rounded-lg transition px-5 py-3.5 text-sm bg-brand-500 text-white shadow-theme-xs hover:bg-brand-600 disabled:bg-brand-300 disabled:cursor-not-allowed disabled:opacity-50"
        >
          {{ isLoading ? 'Saving...' : isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
